<script>
// 创建一个包含多种颜色组合的数组
const colorSets2 = [
  { hex: "#FF5733", name: "番茄红" },
  { hex: "#33FF57", name: "薄荷绿" },
  { hex: "#3357FF", name: "天空蓝" },
  { hex: "#FF33E5", name: "粉红" },
  { hex: "#E5FF33", name: "柠檬黄" },
  { hex: "#33E5FF", name: "天蓝" },
  { hex: "#E533FF", name: "紫罗兰" }
];

// 从元素的data-colors 获取颜色数组
function extractColors(element) {
	const rawData = element.getAttribute('data-colors');
	// 统一替换引号并修复不配对情况
	const sanitized = rawData.replace(/['"]/g, '').replace(/^"|"$/g, '').replace("[", "").replace("]","");
	// 按逗号或空格分割并去空格
	const results=sanitized.split(/[\s,]+/); //.filter(color => color.startsWith('#'));
	return results;
}
//const colors = extractColors(document.getElementById('box1b'));

/* 主函数:
- 生成颜色展示面板
- F12控制台显示颜色
参数：
1 颜色数组；或者对象id，取其 data-colors属性
*/
function createColorDisplay(colorSets=colorSets2, width=100, height=50, fontSize=12) {
	const container = document.createElement('div');
	container.style.fontSize = '0'; /* 父容器消除空白 */
	container.style.margin = '0';
	container.style.padding = '0';
	
	if(typeof colorSets === 'string'){
		colorSets=extractColors(document.getElementById(colorSets));
		console.log("--> load data-colors: ",colorSets)
	}

	colorSets.forEach(color => {
		const colorCard = document.createElement('div');
		colorCard.style.display = 'inline-block';
		colorCard.style.fontSize = fontSize+'px'; /* 子容器设置字体 */
		colorCard.style.width = width+'px';
		colorCard.style.height = height+'px';
		colorCard.style.backgroundColor = color;
		//colorCard.style.borderRadius = '8px';

		const span = document.createElement('span');
		span.innerText = color;
		colorCard.appendChild(span);

		container.appendChild(colorCard);
	});
  
	// 添加按钮控制台打印功能
	function addConsoleButton(colorSets) {
	  const btn = document.createElement('button');
	  btn.innerText = 'F12_log';
	  btn.style.margin = '0 10px';
	  btn.style.padding = '2px 5px';
	  btn.style.cursor = 'pointer';
	  
	  btn.addEventListener('click', () => {
		var arr=[]
		colorSets.forEach((color, index) => {
		  //console.log(`${index + 1}. ${color.name} - ${color.hex}`);
		  arr.push(color)
		});
		
		// show in console
		console.log(arr)
		var bgcolor=('background:'+arr.join('; |background:') ).split(' |');
		console.log.apply(null, ['%c "'+arr.join('", %c "')].concat(bgcolor) )
	  });
	  
	  return btn;
	}

	container.appendChild( addConsoleButton(colorSets) );
	return container;
}


/* 使用方法
1. 添加 div: 带id
2. 添加js: 创建html展示颜色和按钮
- 参数1 颜色hex列表
- 参数2 每个颜色宽度
- 参数3 每个颜色的高度
- 参数4 颜色hex字体大小
*/
document.addEventListener('DOMContentLoaded', () => {
	//显示到dom中
	//box1.appendChild(createColorDisplay( colorSets2.map(item => item.hex), 100, 30)); //输入 hex 数组
	bar1.appendChild(createColorDisplay("bar1", 90, 40));
	
	box1.appendChild(createColorDisplay("box1", 90, 50)); //输入 hex 数组
	box1b.appendChild(createColorDisplay("box1b", 90, 50));
	box2.appendChild(createColorDisplay("box2", 80, 40, 14));
	box3.appendChild(createColorDisplay("box3", 80, 40));
	box3b.appendChild(createColorDisplay("box3b", 50, 25, 10));
	box3c.appendChild(createColorDisplay("box3c", 50, 25, 10));
});
</script>
